name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set deployment target
        id: target
        run: |
          echo "host=${{ secrets.AWS_EC2_HOST_PROD }}" >> $GITHUB_OUTPUT
          echo "pm2_name=kuamini-prod" >> $GITHUB_OUTPUT
          echo "env_file=.env.production" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          command_timeout: 45m
          script: |
            set -e
            cd /home/ubuntu/apps/kuamini-prod

            echo "Disk usage before cleanup..."
            df -h

            echo "Cleaning caches and build artifacts to free disk space..."
            rm -rf .next || true
            rm -rf node_modules/.cache || true
            rm -rf /tmp/*next* /tmp/*turbo* 2>/dev/null || true
            pnpm store prune || true
            npm cache clean --force || true
            pm2 flush || true
            find ~/.pm2/logs -type f -name "*.log" -size +20M -delete 2>/dev/null || true
            git gc --prune=now || true

            echo "Disk usage after cleanup..."
            df -h

            echo "Pulling latest code..."
            git fetch origin
            git checkout ${{ github.ref_name }}
            git pull origin ${{ github.ref_name }}

            echo "Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "Preparing memory for build..."
            if ! swapon --show | grep -q '/swapfile'; then
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
            export NODE_OPTIONS="--max_old_space_size=768"

            echo "Building application..."
            pnpm run build

            echo "Restarting application..."
            pm2 restart ${{ steps.target.outputs.pm2_name }} || \
              pm2 start "pnpm start" --name ${{ steps.target.outputs.pm2_name }}
            pm2 save

            echo "Deployment complete for ${{ github.ref_name }}"

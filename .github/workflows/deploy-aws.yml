name: Deploy to AWS EC2

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set deployment target
        id: target
        run: |
          echo "host=${{ secrets.AWS_EC2_HOST_PROD }}" >> $GITHUB_OUTPUT
          echo "pm2_name=kuamini-prod" >> $GITHUB_OUTPUT
          echo "env_file=.env.production" >> $GITHUB_OUTPUT

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL: ${{ secrets.NEXTAUTH_URL }}
        with:
          host: ${{ steps.target.outputs.host }}
          username: ${{ secrets.AWS_EC2_USER }}
          key: ${{ secrets.AWS_EC2_SSH_KEY }}
          command_timeout: 45m
          envs: DATABASE_URL,NEXTAUTH_SECRET,NEXTAUTH_URL
          script: |
            set -e
            APP_DIR="/home/ubuntu/apps/kuamini-prod"
            REPO="git@github.com:vikneeswaran/threat-protection-server.git"

            echo "=== Validating production DB URL ==="
            if [ -z "$DATABASE_URL" ]; then
              echo "DATABASE_URL is empty"
              exit 1
            fi
            if [[ "$DATABASE_URL" == *"@127.0.0.1:"* ]] || [[ "$DATABASE_URL" == *"@localhost:"* ]] || [[ "$DATABASE_URL" == *":5433/"* ]]; then
              echo "DATABASE_URL appears tunnel-only (localhost/127.0.0.1 or port 5433)."
              echo "Use direct RDS endpoint in production instead of SSH tunnel forwarding."
              exit 1
            fi

            echo "=== Disk usage before cleanup ==="
            df -h /

            echo "=== Freeing disk space ==="
            rm -rf "$APP_DIR/.next" || true
            rm -rf "$APP_DIR/node_modules" || true
            pm2 flush || true
            find /home/ubuntu/.pm2/logs -type f -name "*.log" -size +10M -delete 2>/dev/null || true
            sudo apt-get clean -y || true
            sudo journalctl --vacuum-size=50M || true
            sudo find /tmp -mindepth 1 -maxdepth 1 -mtime +1 -exec rm -rf {} + 2>/dev/null || true

            echo "=== Disk usage after cleanup ==="
            df -h /

            echo "=== Ensuring repo is healthy ==="
            if [ -d "$APP_DIR/.git" ]; then
              if ! git -C "$APP_DIR" fsck --no-dangling --quiet 2>/dev/null; then
                echo "Repo corrupted — re-cloning..."
                rm -rf "$APP_DIR"
                git clone "$REPO" "$APP_DIR"
              fi
            else
              echo "Repo missing — cloning fresh..."
              mkdir -p /home/ubuntu/apps
              git clone "$REPO" "$APP_DIR"
            fi

            echo "=== Pulling latest code ==="
            cd "$APP_DIR"
            git fetch origin
            git checkout ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}

            API_BASE_URL="$NEXTAUTH_URL"
            echo "=== Writing .env.production from GitHub secrets ==="
            {
              echo "# Generated by deploy workflow"
              echo "DATABASE_URL=$DATABASE_URL"
              echo "NEXTAUTH_SECRET=$NEXTAUTH_SECRET"
              echo "NEXTAUTH_URL=$NEXTAUTH_URL"
              echo "NEXT_PUBLIC_API_BASE_URL=$API_BASE_URL"
              echo "NODE_ENV=production"
              echo "PORT=3000"
              echo "API_TIMEOUT=30000"
              echo "LOG_LEVEL=info"
            } > "$APP_DIR/.env.production"
            chmod 600 "$APP_DIR/.env.production"

            if [ -f "$APP_DIR/.env.local" ]; then
              mv "$APP_DIR/.env.local" "$APP_DIR/.env.local.bak.$(date +%Y%m%d%H%M%S)"
            fi

            echo "Installing dependencies..."
            pnpm install --frozen-lockfile

            echo "Preparing memory for build..."
            if ! swapon --show | grep -q '/swapfile'; then
              sudo fallocate -l 2G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=2048
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi
            export NODE_OPTIONS="--max_old_space_size=768"

            echo "Building application..."
            pnpm run build

            echo "Restarting application..."
            pm2 restart ${{ steps.target.outputs.pm2_name }} || \
              pm2 start "pnpm start" --name ${{ steps.target.outputs.pm2_name }}
            pm2 save

            echo "Deployment complete for ${{ github.ref_name }}"

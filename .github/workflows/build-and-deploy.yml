name: Build and Deploy Installers

on:
  push:
    branches:
      - main
    paths:
      - 'agent-tray/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS PKG installer
        run: |
          cd agent-tray
          bash build/pkgbuild-mac.sh

      - name: Upload macOS PKG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: agent-tray/dist/KuaminiSecurityClient-1.0.0.pkg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows package
        run: |
          cd agent-tray
          python build/build-windows-msi.py

      - name: Upload Windows ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: public/tray/windows.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          cd agent-tray
          rm -rf dist/KuaminiSecurityClient
          pyinstaller main.py --onedir --name=KuaminiSecurityClient -y

      - name: Package Linux artifact
        run: |
          cd agent-tray
          tar -czf dist/KuaminiSecurityClient-linux.tar.gz -C dist KuaminiSecurityClient

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: agent-tray/dist/KuaminiSecurityClient-linux.tar.gz
          retention-days: 30

  deploy:
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Deploy to public/tray
        run: |
          mkdir -p public/tray
          cp macos-pkg/KuaminiSecurityClient-1.0.0.pkg public/tray/
          cp windows-msi/KuaminiSecurityClient-1.0.0.msi public/tray/
          cp linux-tar/KuaminiSecurityClient-linux.tar.gz public/tray/
          
          echo "Deployed installers:"
          ls -lh public/tray/* 2>/dev/null || true
 || true
          cp windows-zip/windows.zip public/tray/ || true
          cp linux-tar/KuaminiSecurityClient-linux.tar.gz public/tray/ || true
          
          echo "Deployed installers:"
          ls -lh public/tray/* 2>/dev/null || true

      - name: Commit and push installers
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          git add public/tray/*.pkg public/tray/*.zip public/tray/*.tar.gz 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: update installers from latest code"
            git pull --rebase origin main
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            public/tray/KuaminiSecurityClient-1.0.0.pkg
            public/tray/windows.zip
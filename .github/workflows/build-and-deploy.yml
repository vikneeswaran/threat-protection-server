name: Build and Deploy Installers

on:
  push:
    branches:
      - main
    paths:
      - 'agent-tray/**'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run type-check

      - name: Run tests
        run: npm run test

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          cd agent-tray
          pyinstaller KuaminiSecurityClient-mac.spec

      - name: Create macOS package
        run: |
          cd agent-tray/build
          chmod +x pkgbuild-mac.sh
          ./pkgbuild-mac.sh

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: agent-tray/build/KuaminiSecurityClient-1.0.0.pkg
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          cd agent-tray
          pyinstaller KuaminiSecurityClient-win.spec

      - name: Create Windows MSI
        run: |
          cd agent-tray/build
          powershell -ExecutionPolicy Bypass -File build-windows-msi.ps1

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: agent-tray/build/KuaminiSecurityClient-1.0.0.msi
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          cd agent-tray
          rm -rf dist/KuaminiSecurityClient
          pyinstaller main.py --onedir --name=KuaminiSecurityClient -y

      - name: Package Linux artifact
        run: |
          cd agent-tray
          tar -czf dist/KuaminiSecurityClient-linux.tar.gz -C dist KuaminiSecurityClient

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: agent-tray/dist/KuaminiSecurityClient-linux.tar.gz
          retention-days: 30

  deploy:
    needs: [test, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Deploy to public/tray
        run: |
          mkdir -p public/tray
          cp macos-pkg/KuaminiSecurityClient-1.0.0.pkg public/tray/ || true
          cp windows-msi/KuaminiSecurityClient-1.0.0.msi public/tray/ || true
          cp linux-tar/KuaminiSecurityClient-linux.tar.gz public/tray/ || true
          
          echo "Deployed installers:"
          ls -lh public/tray/* 2>/dev/null || true

      - name: Commit and push installers
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global pull.rebase false
          
          # Pull latest main, preferring current artifacts on conflict (avoids binary rebase issues)
          git fetch origin main
          git pull --no-rebase --strategy=ours origin main || true

          git add public/tray/*.pkg public/tray/*.zip public/tray/*.tar.gz 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: update installers from latest code"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            public/tray/KuaminiSecurityClient-1.0.0.pkg
            public/tray/KuaminiSecurityClient-1.0.0.msi
            public/tray/KuaminiSecurityClient-linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
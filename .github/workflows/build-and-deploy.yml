name: Build and Deploy Installers

on:
  push:
    branches:
      - main
    paths:
      - 'agent-tray/**'
      - 'app/**'
      - 'components/**'
      - 'hooks/**'
      - 'lib/**'
      - 'tests/**'
      - 'types/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - 'eslint.config.js'
      - 'vitest.config.ts'
      - 'public/tray/install-kuamini-macos.sh'
      - 'public/tray/install-kuamini-windows-cli.ps1'
      - 'public/tray/install-windows.cmd'
      - '.github/workflows/build-and-deploy.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          package-manager-cache: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run linter
        run: pnpm run lint

      - name: Run type check
        run: pnpm run type-check

      - name: Run tests
        run: pnpm run test

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS app
        run: |
          cd agent-tray
          pyinstaller KuaminiSecurityClient-mac.spec

      - name: Create macOS package
        run: |
          cd agent-tray/build
          chmod +x pkgbuild-mac.sh
          ./pkgbuild-mac.sh

      - name: Resolve built macOS package path
        id: macpkg
        shell: bash
        run: |
          PKG_PATH=$(ls -t agent-tray/build/KuaminiSecurityClient-*.pkg | head -n1)
          if [ -z "$PKG_PATH" ]; then
            echo "No macOS package found" >&2
            exit 1
          fi
          echo "path=$PKG_PATH" >> $GITHUB_OUTPUT
          echo "Resolved macOS package: $PKG_PATH"

      - name: Upload macOS package
        uses: actions/upload-artifact@v4
        with:
          name: macos-pkg
          path: ${{ steps.macpkg.outputs.path }}
          retention-days: 30

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows MSI (PyInstaller + WiX)
        run: |
          cd agent-tray
          python build/build-windows-msi.py

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: agent-tray/dist/KuaminiSecurityClient-1.0.5.msi
          retention-days: 30
          
      - name: Upload Windows ZIP
        uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: public/tray/windows.zip
          retention-days: 30

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux executable
        run: |
          cd agent-tray
          rm -rf dist/KuaminiSecurityClient
          pyinstaller main.py --onedir --name=KuaminiSecurityClient -y

      - name: Package Linux artifact
        run: |
          cd agent-tray
          tar -czf dist/KuaminiSecurityClient-linux.tar.gz -C dist KuaminiSecurityClient

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-tar
          path: agent-tray/dist/KuaminiSecurityClient-linux.tar.gz
          retention-days: 30

  deploy:
    needs: [test, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Deploy to public/tray
        run: |
          mkdir -p public/tray
          cp macos-pkg/KuaminiSecurityClient-*.pkg public/tray/ || true
          cp windows-msi/KuaminiSecurityClient-1.0.5.msi public/tray/ || true
          cp windows-zip/windows.zip public/tray/ || true
          cp linux-tar/KuaminiSecurityClient-linux.tar.gz public/tray/ || true
          
          # Publish installer script with a stable name for console downloads
          if [ -f public/tray/install-kuamini-windows-cli.ps1 ]; then
            cp public/tray/install-kuamini-windows-cli.ps1 public/tray/install.ps1
          fi
          
          echo "Deployed installers:"
          ls -lh public/tray/* 2>/dev/null || true

      - name: Commit and push installers
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git config --global pull.rebase false
          
          # Pull latest main, preferring current artifacts on conflict (avoids binary rebase issues)
          git fetch origin main
          git pull --no-rebase --strategy=ours origin main || true

          # Add all installer files (binary and scripts)
          git add public/tray/*.pkg public/tray/*.msi public/tray/*.tar.gz public/tray/*.zip public/tray/*.ps1 public/tray/*.cmd 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: update installers from latest code ($(date -u +%Y-%m-%d))"
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            public/tray/KuaminiSecurityClient-1.0.0.pkg
            public/tray/KuaminiSecurityClient-1.0.5.msi
            public/tray/windows.zip
            public/tray/KuaminiSecurityClient-linux.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
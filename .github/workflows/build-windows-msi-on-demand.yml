name: Build Windows MSI (On Demand)

on:
  workflow_dispatch:
    inputs:
      token:
        description: "Registration token (base64)"
        required: true
        type: string
      accountId:
        description: "Account ID"
        required: true
        type: string
      accountName:
        description: "Account Name"
        required: true
        type: string
      version:
        description: "MSI version"
        required: false
        default: "1.0.5"
        type: string

permissions:
  contents: write

jobs:
  build-windows-msi:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd agent-tray
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        run: |
          cd agent-tray
          pyinstaller KuaminiSecurityClient-win.spec

      - name: Build MSI with embedded token
        run: |
          cd agent-tray/build
          powershell -ExecutionPolicy Bypass -File build-windows-msi.ps1 -RegistrationToken "${{ inputs.token }}" -AccountId "${{ inputs.accountId }}" -AccountName "${{ inputs.accountName }}" -Version "${{ inputs.version }}"

      - name: Stage MSI for download
        run: |
          $msiPath = Join-Path "${{ github.workspace }}" "agent-tray\dist\KuaminiSecurityClient-${{ inputs.version }}.msi"
          if (!(Test-Path $msiPath)) {
            Write-Host "MSI not found at $msiPath" -ForegroundColor Red
            exit 1
          }
          $dest = Join-Path "${{ github.workspace }}" "public\tray\KuaminiSecurityClient-${{ inputs.accountId }}.msi"
          Copy-Item $msiPath $dest -Force
          Write-Host "Saved tokenized MSI to $dest" -ForegroundColor Green

      - name: Commit and push MSI
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git add "public/tray/KuaminiSecurityClient-${{ inputs.accountId }}.msi"

          if (git diff --cached --quiet) {
            Write-Host "No changes to commit"
          } else {
            git commit -m "build: windows msi for account ${{ inputs.accountId }}"
            git push origin main
          }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

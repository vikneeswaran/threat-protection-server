name: Build Security Client Agents

on:
  push:
    branches:
      - main
    paths:
      - 'agent-tray/**'
      - 'types/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig.json'
      - '.github/workflows/build-agents.yml'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-macos:
    name: Build macOS Agent
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS PKG installer
        run: |
          cd agent-tray
          bash build/pkgbuild-mac.sh

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-agent
          path: agent-tray/dist/KuaminiSecurityClient-1.0.0.pkg
          retention-days: 30

  build-windows:
    name: Build Windows Agent
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows agent (PyInstaller + WiX + ZIP)
        run: |
          cd agent-tray
          python build/build-windows-msi.py

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-agent
          path: public/tray/windows.zip
          retention-days: 30

  build-linux:
    name: Build Linux Agent
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd agent-tray
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux agent
        run: |
          cd agent-tray
          rm -rf dist/KuaminiSecurityClient
          pyinstaller main.py --onedir --name=KuaminiSecurityClient -y

      - name: Package Linux artifact
        run: |
          cd agent-tray
          tar -czf dist/KuaminiSecurityClient-linux.tar.gz -C dist KuaminiSecurityClient

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-agent
          path: agent-tray/dist/KuaminiSecurityClient-linux.tar.gz
          retention-days: 30

  deploy:
    name: Deploy Agents
    needs: [build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Prepare distribution
        run: |
          mkdir -p public/tray
          
          # Copy macOS agent
          if [ -f "macos-agent/KuaminiSecurityClient-1.0.0.pkg" ]; then
            cp macos-agent/KuaminiSecurityClient-1.0.0.pkg public/tray/
            echo "✓ macOS agent copied"
          else
            echo "⚠ macOS agent not found"
          fi
          
          # Copy Windows agent
          if [ -f "windows-agent/windows.zip" ]; then
            cp windows-agent/windows.zip public/tray/
            echo "✓ Windows agent copied"
          else
            echo "⚠ Windows agent not found"
          fi
          
          # Copy Linux agent
          if [ -f "linux-agent/KuaminiSecurityClient-linux.tar.gz" ]; then
            cp linux-agent/KuaminiSecurityClient-linux.tar.gz public/tray/
            echo "✓ Linux agent copied"
          else
            echo "⚠ Linux agent not found"
          fi
          
          echo ""
          echo "Deployed agents:"
          ls -lh public/tray/

      - name: Commit and push agents
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          
          # Stage agent files
          git add public/tray/KuaminiSecurityClient-1.0.0.pkg public/tray/windows.zip public/tray/KuaminiSecurityClient-linux.tar.gz 2>/dev/null || true
          
          # Check if there are changes to commit
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "build: update agents from latest codebase"
            git pull --rebase origin main
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release (on tag)
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            public/tray/KuaminiSecurityClient-1.0.0.pkg
            public/tray/windows.zip
            public/tray/KuaminiSecurityClient-linux.tar.gz
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r agent-tray/requirements.txt pyinstaller

      - name: Build app (PyInstaller)
        shell: pwsh
        run: |
          Set-Location agent-tray
          pyinstaller --noconfirm --onedir --windowed --name KuaminiAgentTray main.py

      - name: Create windows.zip payload
        shell: pwsh
        run: |
          Compress-Archive -Path "agent-tray/dist/KuaminiAgentTray/*" -DestinationPath "agent-tray/dist/windows.zip"

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: cmd
        run: '"C:\\Program Files (x86)\\Inno Setup 6\\ISCC.exe" agent-tray\\build\\inno-setup-template.iss'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            agent-tray/dist/windows.zip
            agent-tray/build/Output/*.exe
            agent-tray/dist/KuaminiAgentTray/**/*
